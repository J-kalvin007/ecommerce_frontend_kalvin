# ======================================================================
#  nginx/nginx.conf — Global Nginx configuration
#  Security-hardened, performance-tuned for a Next.js frontend.
# ======================================================================

user  nginx;
worker_processes  auto;           # one worker per CPU core

# Reduce attack surface: hide nginx version from headers & error pages
server_tokens  off;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
    use                 epoll;
}

http {
    # ── MIME types ───────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging (JSON-compatible format for log aggregators) ─────────
    log_format  main  ' -  [] '
                      '""   '
                      '"" "" '
                      'rt= uct= '
                      'uht= urt=';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip compression ─────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Upstream: the Next.js standalone server ───────────────────────
    upstream nextjs_upstream {
        server kalvin_nextjs:3000;
        keepalive 64;
    }

    # ── Rate limiting (protect API routes from abuse) ─────────────────
    # 30 req/s per IP on API endpoints; burst of 60 queued, then 429.
    limit_req_zone    zone=api_limit:10m  rate=30r/s;

    # ── Proxy cache (store Next.js ISR / SSG pages) ───────────────────
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=nextjs_cache:10m
        max_size=1g
        inactive=60m
        use_temp_path=off;

    # ── Include per-vhost configs ─────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
