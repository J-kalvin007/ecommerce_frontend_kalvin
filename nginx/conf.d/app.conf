# ======================================================================
#  nginx/conf.d/app.conf — Virtual host for ecommerce_frontend_kalvin
#
#  Replace YOUR_DOMAIN.COM with your actual domain.
#  TLS certificates must be placed in nginx/ssl/ before starting.
#  Use Certbot/Let's Encrypt or your own CA.
# ======================================================================

# ── HTTP → HTTPS permanent redirect ───────────────────────────────────
server {
    listen       80;
    listen  [::]:80;
    server_name  YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    # Allow Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other requests: 301 redirect to HTTPS
    location / {
        return 301 https://System.Management.Automation.Internal.Host.InternalHost;
    }
}

# ── HTTPS main server block ────────────────────────────────────────────
server {
    listen       443 ssl;
    listen  [::]:443 ssl;
    http2  on;
    server_name  YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    # ── TLS ─────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Modern TLS settings (A+ on SSL Labs)
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  off;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;
    resolver                   8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout           5s;

    # ── Security headers ─────────────────────────────────────────────
    # HSTS: force HTTPS for 1 year, include subdomains
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    # Prevent MIME sniffing
    add_header X-Content-Type-Options     "nosniff"          always;
    # Block clickjacking
    add_header X-Frame-Options            "SAMEORIGIN"       always;
    # XSS filter (legacy browsers)
    add_header X-XSS-Protection           "1; mode=block"    always;
    # Referrer policy
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    # Permissions policy (disable dangerous browser APIs)
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(self), interest-cohort=()" always;
    # Content-Security-Policy (tighten once you know all your sources)
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com https://maps.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https:; frame-src 'none';" always;

    # ── File size limits ─────────────────────────────────────────────
    client_max_body_size  20m;

    # ── Proxy settings ───────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Upgrade           ;
    proxy_set_header        Connection        "upgrade";
    proxy_set_header        Host              System.Management.Automation.Internal.Host.InternalHost;
    proxy_set_header        X-Real-IP         ;
    proxy_set_header        X-Forwarded-For   ;
    proxy_set_header        X-Forwarded-Proto ;
    proxy_set_header        X-Forwarded-Host  System.Management.Automation.Internal.Host.InternalHost;
    proxy_set_header        X-Forwarded-Port  ;
    proxy_cache_bypass      ;
    proxy_read_timeout      60s;
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;

    # ── Static assets: immutable cache (Next.js hashed chunks) ──────
    # _next/static/ files have content-hashed names → cache forever
    location /_next/static/ {
        proxy_pass        http://nextjs_upstream;
        proxy_cache       nextjs_cache;
        proxy_cache_valid 200 365d;
        add_header        Cache-Control "public, max-age=31536000, immutable";
        access_log        off;
    }

    # ── Next.js image optimization endpoint ─────────────────────────
    location /_next/image {
        proxy_pass         http://nextjs_upstream;
        proxy_cache        nextjs_cache;
        proxy_cache_valid  200 24h;
        add_header         Cache-Control "public, max-age=86400, stale-while-revalidate=604800";
    }

    # ── Health check endpoint (bypass rate-limit) ────────────────────
    location /api/health {
        proxy_pass             http://nextjs_upstream;
        access_log             off;
        proxy_read_timeout     5s;
    }

    # ── API routes: rate-limited ─────────────────────────────────────
    location /api/ {
        limit_req   zone=api_limit burst=60 nodelay;
        limit_req_status 429;
        proxy_pass  http://nextjs_upstream;
    }

    # ── Public assets (favicon, robots.txt, icons …) ─────────────────
    location /public/ {
        proxy_pass         http://nextjs_upstream;
        add_header         Cache-Control "public, max-age=86400";
        access_log         off;
    }

    # ── All other routes → Next.js ────────────────────────────────────
    location / {
        proxy_pass          http://nextjs_upstream;
        # Cache ISR / SSG pages for 1 minute (adjust to your revalidation)
        proxy_cache         nextjs_cache;
        proxy_cache_valid   200 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header          X-Cache-Status ;
        # Do not cache responses for authenticated users
        proxy_cache_bypass    ;
        proxy_no_cache        ;
    }
}
