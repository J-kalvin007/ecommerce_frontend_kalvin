# ======================================================================
#  docker-compose.yml — ecommerce_frontend_kalvin (Production)
#
#  Architecture :
#    ┌──────────────────────┐     ┌──────────────────────┐
#    │   nginx (reverse     │────▶│   nextjs (app)       │
#    │   proxy + TLS term.) │     │   :3000 (internal)   │
#    │   :80 / :443         │     └──────────────────────┘
#    └──────────────────────┘
#
#  Usage :
#    cp .env.example .env.production
#    # Fill .env.production with real secrets
#    docker compose --env-file .env.production up -d --build
# ======================================================================

name: ecommerce-frontend

# ── Shared network (isolated from host by default) ───────────────────
networks:
  frontend_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:

  # ────────────────────────────────────────────────────────────────────
  #  nextjs — The compiled Next.js application (standalone mode)
  # ────────────────────────────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner           # only the lean production stage
      args:
        # Build-time vars baked into the JS bundle
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_GOOGLE_MAP_KEY: ${NEXT_PUBLIC_GOOGLE_MAP_KEY}

    image: ecommerce-frontend/nextjs:latest

    container_name: kalvin_nextjs

    restart: unless-stopped

    # ── Runtime secrets (server-side only, never in JS bundle) ────────
    environment:
      NODE_ENV:                     production
      PORT:                         3000
      HOSTNAME:                     0.0.0.0
      TZ:                           Africa/Abidjan
      NEXT_TELEMETRY_DISABLED:      "1"
      # Secret keys — injected from the host environment / .env.production
      # These are NOT prefixed NEXT_PUBLIC_ so they stay server-side.
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}

    # ── Ports: NOT exposed to host — Nginx is the only public entry ───
    # Uncomment the line below ONLY for local debugging:
    # ports:
    #   - "127.0.0.1:3000:3000"

    networks:
      - frontend_net

    # ── Health-check (mirrors the Dockerfile HEALTHCHECK) ─────────────
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # ── Resource limits (prevent runaway memory / CPU) ─────────────────
    deploy:
      resources:
        limits:
          cpus:   "1.5"
          memory: 1024M
        reservations:
          cpus:   "0.25"
          memory: 256M

    # ── Logging (structured, size-bounded) ────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

    # ── Security hardening ────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    read_only: true                # root filesystem is read-only
    tmpfs:
      - /tmp:mode=1777,size=128m  # writable scratch space only in /tmp

  # ────────────────────────────────────────────────────────────────────
  #  nginx — Reverse proxy, static asset cache, TLS termination
  # ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine

    container_name: kalvin_nginx

    restart: unless-stopped

    depends_on:
      nextjs:
        condition: service_healthy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      # Mount the Nginx config generated below
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # TLS certificates (managed externally — e.g. Certbot / Let's Encrypt)
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Shared cache volume for Next.js static assets
      - nginx_cache:/var/cache/nginx

    networks:
      - frontend_net

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    security_opt:
      - no-new-privileges:true

# ── Named volumes ─────────────────────────────────────────────────────
volumes:
  nginx_cache:
    driver: local
